name: Explore CCode Project

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  explore:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: System information
        run: |
          echo "===== SYSTEM ====="
          uname -a
          pwd

      - name: Repository tree
        run: |
          echo "===== FILE TREE ====="
          find . | sort

      - name: Search important files
        run: |
          echo "===== IMPORTANT FILES ====="
          find . \( \
            -name "*.lua" -o \
            -name "*.gradle" -o \
            -name "*.sh" -o \
            -name "*.mk" -o \
            -name "*.yml" -o \
            -name "*.xml" -o \
            -name "build.settings" -o \
            -name "AndroidManifest.xml" -o \
            -name "config.lua" -o \
            -name "main.lua" \
          \)

      - name: Search executables
        run: |
          echo "===== EXECUTABLES ====="
          find . -type f -executable

      - name: Search Gradle wrapper
        run: |
          echo "===== GRADLE ====="
          find . -name "gradlew"

      - name: Search Android projects
        run: |
          echo "===== ANDROID ====="
          find . -name "build.gradle"
          find . -name "settings.gradle"
          find . -name "*.apk"

      - name: Upload project listing
        uses: actions/upload-artifact@v4
        with:
          name: project-tree
          path: .
