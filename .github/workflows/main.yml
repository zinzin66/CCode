name: Build APK (Solar2D)

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip libssl-dev libglu1-mesa-dev

      - name: Download Solar2D
        continue-on-error: true
        run: |
          wget -O solar2d.tar.gz https://github.com/coronalabs/corona/releases/download/2024.3706/Solar2D-Linux-2024.3706.tar.gz || true

          if [ -f solar2d.tar.gz ]; then
            tar -xzf solar2d.tar.gz
          fi

      - name: Verify Solar2D installation
        run: |
          echo "=== Solar2D executables ==="
          find . -iname "*solar2d*" || true
          find . -iname "*Corona*" || true

      - name: Check project structure
        run: |
          echo "=== Root ==="
          ls -la
          echo "=== Lua files ==="
          find . -name "*.lua" | head -100
          echo "=== build.settings ==="
          cat build.settings || echo "No build.settings"

      - name: Prepare build directory
        run: mkdir -p build/apk

      - name: Build APK (attempt)
        continue-on-error: true
        run: |
          SOLAR=$(find . -type f \( -iname "solar2d" -o -iname "Corona" \) | head -1)

          echo "Executable trouvé : $SOLAR"

          if [ -n "$SOLAR" ]; then
            chmod +x "$SOLAR"
            "$SOLAR" compile --platform android --output build/apk
          else
            echo "Aucun exécutable Solar2D trouvé."
          fi

      - name: List generated files
        run: |
          echo "=== APK ==="
          find . -name "*.apk" || true
          echo "=== Build ==="
          find build || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: build

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: |
            **/*.apk
            build/apk
